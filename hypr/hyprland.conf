# #######################################################################################
# CLEANED & OPTIMIZED HYPRLAND CONFIG
# #######################################################################################

# Tắt dải banner cảnh báo màu vàng ở đỉnh màn hình
autogenerated = 0

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# Laptop screen (60 Hz)
monitor = eDP-1,1920x1080@60,0x0,1

# External monitor (120 Hz, đặt bên phải laptop)
monitor = HDMI-A-1,1920x1080@120,1920x0,1


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun


#################
### AUTOSTART ###
#################

# Mạng & Kết nối
exec-once = nm-applet &

# Giao diện & Hình nền
exec-once = swww-daemon &
exec-once = ~/.config/hypr/random_wall.sh &

# Thanh trạng thái & Thông báo (Chọn 1 trong 2 combo dưới đây bằng cách bỏ dấu #)
exec-once = hyprpanel &
# exec-once = waybar &
# exec-once = mako &


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 3

    # Độ trong suốt cửa sổ (đúng gu mờ ảo mướt mắt luôn)
    active_opacity = 0.85
    inactive_opacity = 0.8

    shadow {
        enabled = true
        range = 10
    }

    blur {
        enabled = yes
        size = 6
        passes = 3
        new_optimizations = on
        ignore_opacity = on
        xray = false
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1

    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
}

dwindle {
    pseudotile = true 
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0 

    touchpad {
        natural_scroll = true
    }
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER 

# App Launchers & Window Controls
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, ESCAPE, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo, 
bind = $mainMod, J, togglesplit, 
bind = $mainMod, F, fullscreen,

# Mở Eww Dashboard bằng SUPER + D
bind = $mainMod, D, exec, ~/.config/eww/launch_dashboard

# Chụp ảnh màn hình (Shift+Print screen -> chọn vùng rồi lưu vào clipboard)
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
# Di chuyển tiêu điểm (Focus)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Chuyển đổi Workspace (1-10)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Di chuyển cửa sổ sang Workspace khác
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad (Special workspace)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Cuộn chuột để chuyển Workspace nhanh
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Giữ Mod + Chuột trái/phải để kéo thả/resize cửa sổ
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Phím tắt âm lượng & độ sáng (sử dụng Pamixer & Brightnessctl)
bindle = ,XF86AudioRaiseVolume, exec, pamixer -i 5
bindle = ,XF86AudioLowerVolume, exec, pamixer -d 5
bindel = ,XF86AudioMute, exec, pamixer -t
bindle = ,XF86MonBrightnessUp, exec, brightnessctl set +5%
bindle = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Điều khiển nhạc (Playerctl)
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
